name: Build & Release

# Triggers on every push of a version tag (v1.0.0, v1.2.3, etc.)
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: NOVAViewer.app
            archive: NOVAViewer-mac.dmg
          - os: windows-latest
            artifact: NOVAViewer.exe
            archive: NOVAViewer-setup.exe
          - os: ubuntu-latest
            artifact: NOVAViewer
            archive: NOVAViewer-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow pyinstaller dmgbuild rawpy numpy pillow-heif

      - name: Install Tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Set version
        run: python set_version.py ${{ github.ref_name }}

      - name: Generate icons
        run: python make_icon.py

      - name: Build with PyInstaller
        run: python build.py

      # macOS: ad-hoc sign → changes "damaged" to "unidentified developer" → Privacy & Security shows "Open Anyway"
      - name: Sign app (macOS)
        if: runner.os == 'macOS'
        run: codesign --deep --force --sign - dist/NOVAViewer.app

      # macOS: styled DMG with custom background
      - name: Archive (macOS)
        if: runner.os == 'macOS'
        run: dmgbuild -s dmg_settings.py -D app=dist/NOVAViewer.app "NOVA Viewer" NOVAViewer-mac.dmg

      # Windows: build NSIS installer
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Patch installer version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          $parts = ($v + ".0") -split "\." | Select-Object -First 4
          $vi = $parts -join "."
          (Get-Content installer.nsi) `
            -replace 'VIProductVersion ".*"', "VIProductVersion `"$vi`"" `
            -replace '(VIAddVersionKey "FileVersion"\s+)".*"', "`$1`"$v`"" |
          Set-Content installer.nsi

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:Path += ";C:\Program Files (x86)\NSIS"
          makensis installer.nsi

      # Linux: copy binary
      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: cp dist/NOVAViewer ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "NOVA Viewer ${{ github.ref_name }}"
          body: |
            ## NOVA Viewer ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS    | `NOVAViewer-mac.dmg` — ouvre le DMG, glisse dans Applications |
            | Windows  | `NOVAViewer-setup.exe` — double-clic pour installer |
            | Linux    | `NOVAViewer-linux` — `chmod +x`, then `sudo ./install.sh` |

            ### Auto-update
            Point `UPDATE_URL` in `updater.py` to:
            ```
            https://github.com/${{ github.repository }}/releases/latest/download/version.json
            ```
          files: |
            artifacts/NOVAViewer-mac.dmg
            artifacts/NOVAViewer-setup.exe
            artifacts/NOVAViewer-linux

      - name: Publish version.json for auto-updater
        run: |
          cat > version.json << EOF
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "notes": "See release notes on GitHub",
            "download": {
              "darwin": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/NOVAViewer-mac.dmg",
              "win32":  "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/NOVAViewer-setup.exe",
              "linux":  "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/NOVAViewer-linux"
            }
          }
          EOF

      - name: Upload version.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: version.json
