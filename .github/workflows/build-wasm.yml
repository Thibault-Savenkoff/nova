name: Build LibRaw WASM

# Verify the build compiles — does NOT auto-commit the binary.
# The committed docs/libraw.{js,wasm} are built locally with emcc 5.0.7.
on:
  push:
    branches: [main]
    paths:
      - 'wasm/libraw_wrapper.cpp'
      - 'wasm/build.sh'
  pull_request:
    paths:
      - 'wasm/libraw_wrapper.cpp'
      - 'wasm/build.sh'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get install -y pkg-config

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.73

      - name: Build LibRaw WASM (verify only)
        run: bash wasm/build.sh
